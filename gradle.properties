# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# gradle.properties (project root)
# Подходит для Gradle + Kotlin + Java 17 в CI и локально
org.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.configureondemand=true
kotlin.code.style=official

# Если хотите, можно принудительно указать путь на JDK (обычно не нужно в Actions)
# org.gradle.java.home=/usr/lib/jvm/temurin-17-jdk-amd64
